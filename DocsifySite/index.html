<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[YOUR STUDIO NAME] — Documentation</title>

    <!-- Docsify theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

    <style>
        /* ===========================================
           CUSTOM OVERRIDES — Change these to rebrand
           =========================================== */
        :root {
            /* Accent */
            --theme-color: #60a5fa;

            /* Sidebar */
            --sidebar-background: #0d0f13;
            --sidebar-border-color: #1e2028;
            --sidebar-name-color: #d4d4d8;
            --sidebar-name-font-weight: 600;
            --sidebar-nav-link-color: #8b8d98;
            --sidebar-nav-link-color--active: #60a5fa;
            --sidebar-nav-link-border-color--active: #60a5fa;
            --sidebar-nav-link-font-weight--active: 500;
            --sidebar-nav-strong-color: #52545e;
            --sidebar-nav-strong-font-size: 0.7rem;
            --sidebar-nav-strong-text-transform: uppercase;
            --sidebar-nav-strong-letter-spacing: 0.08em;
            --sidebar-width: 240px;

            /* Content */
            --content-max-width: 740px;

            /* Base */
            --base-background-color: #111318;
            --base-color: #d4d4d8;
            --base-font-family: 'Source Sans 3', -apple-system, sans-serif;
            --base-font-size: 15px;
            --base-line-height: 1.7;

            /* Headings */
            --heading-font-family: 'Source Serif 4', Georgia, serif;
            --heading-color: #e4e4e7;
            --heading-h1-font-size: 1.85rem;
            --heading-h2-font-size: 1.35rem;
            --heading-h2-border-color: #1e2028;
            --heading-h3-font-size: 1rem;
            --heading-h3-font-family: 'Source Sans 3', sans-serif;

            /* Code */
            --code-font-family: 'Source Code Pro', monospace;
            --code-font-size: 0.82rem;
            --code-inline-background: #1a1d24;
            --code-inline-color: #93bbfd;
            --code-inline-border-radius: 3px;
            --code-block-background: #1a1d24;
            --code-block-border-radius: 6px;

            /* Links */
            --link-color: #60a5fa;
            --link-text-decoration: none;
            --link-text-decoration--hover: underline;

            /* Blockquote / Callouts */
            --blockquote-background: rgba(96, 165, 250, 0.06);
            --blockquote-border-color: #60a5fa;
            --blockquote-border-width: 3px;

            /* Table */
            --table-head-background: #1a1d24;
            --table-head-color: #d4d4d8;
            --table-body-border-color: #1e2028;
            --table-cell-border-color: #1a1c22;

            /* Navbar */
            --navbar-root-background: #0d0f13;
            --navbar-root-border-color: #1e2028;

            /* Cover */
            --cover-background-color: #111318;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2d35; border-radius: 3px; }

        /* Sidebar group labels */
        .sidebar-nav > ul > li > strong {
            display: block;
            margin-top: 1.25rem;
            margin-bottom: 0.25rem;
            padding-left: 0;
        }
    </style>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app"></div>

    <script>
        window.$docsify = {
            name: '[YOUR STUDIO NAME]',
            repo: 'https://github.com/YOUR-USERNAME/YOUR-REPO-NAME',
            loadSidebar: true,
            subMaxLevel: 3,
            auto2top: true,
            homepage: 'home.md',
            search: {
                placeholder: 'Search docs...',
                noData: 'No results.',
                depth: 3
            },
            pagination: {
                previousText: '← Previous',
                nextText: 'Next →',
                crossChapter: true
            }
        };
    </script>

    <!-- Docsify core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <!-- Search plugin -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <!-- Pagination plugin -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
